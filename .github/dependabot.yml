# https://docs.github.com/en/code-security/how-tos/secure-your-supply-chain/secure-your-dependencies/configuring-dependabot-version-updates
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      npm-dependencies:
        patterns:
          - "*"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
      # @types/vscode must stay in sync with engines.vscode in package.json.
      # Bumping it forces a minimum VS Code version upgrade for all users, so
      # we manage it manually rather than letting dependabot auto-update it.
      - dependency-name: "@types/vscode"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
